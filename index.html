<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'bounce-in': 'bounceIn 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        bounceIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '50%': { transform: 'scale(1.05)' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-10 animate-fade-in">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-tasks text-indigo-600 mr-3"></i>
                Professional To-Do List
            </h1>
            <p class="text-gray-600">Kelola tugas harian Anda dengan efisien</p>
        </header>

        <!-- Main Content -->
        <main class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Input Section -->
            <section class="mb-8">
                <div class="flex gap-3 mb-6">
                    <div class="flex-1 relative">
                        <input 
                            type="text" 
                            id="todoInput" 
                            placeholder="Tambahkan tugas baru..." 
                            class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none transition-colors text-gray-700"
                        >
                        <i class="fas fa-pencil-alt absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                    <div class="relative">
                        <input 
                            type="date" 
                            id="todoDate" 
                            class="px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none transition-colors text-gray-700"
                        >
                        <i class="fas fa-calendar absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                    <button 
                        id="addBtn" 
                        class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors duration-200 font-medium shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
                    >
                        <i class="fas fa-plus mr-2"></i>
                        Tambah
                    </button>
                </div>

                <!-- Filter Buttons -->
                <div class="flex gap-2 justify-center flex-wrap mb-4">
                    <button class="filter-btn active px-4 py-2 rounded-full text-sm font-medium transition-all duration-200" data-filter="all">
                        <i class="fas fa-list mr-2"></i>Semua
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200" data-filter="active">
                        <i class="fas fa-clock mr-2"></i>Aktif
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200" data-filter="completed">
                        <i class="fas fa-check-circle mr-2"></i>Selesai
                    </button>
                </div>

                <!-- Date Filter -->
                <div class="flex gap-2 justify-center flex-wrap mb-4">
                    <button class="date-filter-btn active px-3 py-1 rounded-full text-xs font-medium transition-all duration-200" data-date-filter="all">
                        Semua Tanggal
                    </button>
                    <button class="date-filter-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200" data-date-filter="today">
                        Hari Ini
                    </button>
                    <button class="date-filter-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200" data-date-filter="overdue">
                        Terlambat
                    </button>
                    <button class="date-filter-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200" data-date-filter="upcoming">
                        Akan Datang
                    </button>
                </div>

                <!-- Sorting Buttons -->
                <div class="flex gap-2 justify-center flex-wrap">
                    <button class="sort-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-sort="date-asc">
                        <i class="fas fa-sort-amount-down mr-1"></i>Terlama
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-sort="date-desc">
                        <i class="fas fa-sort-amount-up mr-1"></i>Terbaru
                    </button>
                    <button class="sort-btn px-3 py-1 rounded-full text-xs font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-sort="deadline">
                        <i class="fas fa-calendar-alt mr-1"></i>Deadline
                    </button>
                </div>
            </section>

            <!-- Statistics -->
            <section class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-blue-50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-blue-600" id="totalCount">0</div>
                    <div class="text-sm text-gray-600">Total Tugas</div>
                </div>
                <div class="bg-green-50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-green-600" id="completedCount">0</div>
                    <div class="text-sm text-gray-600">Selesai</div>
                </div>
                <div class="bg-orange-50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-orange-600" id="activeCount">0</div>
                    <div class="text-sm text-gray-600">Aktif</div>
                </div>
            </section>

            <!-- Backup/Restore Section -->
            <section class="mb-8">
                <div class="bg-gray-50 rounded-lg p-4">
                    <h3 class="text-lg font-semibold text-gray-800 mb-3 text-center">
                        <i class="fas fa-database text-indigo-600 mr-2"></i>
                        Backup & Restore Data
                    </h3>
                    <div class="flex gap-3 justify-center flex-wrap">
                        <button 
                            id="exportBtn" 
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors duration-200 font-medium text-sm"
                        >
                            <i class="fas fa-download mr-2"></i>
                            Export Data
                        </button>
                        <button 
                            id="importBtn" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium text-sm"
                        >
                            <i class="fas fa-upload mr-2"></i>
                            Import Data
                        </button>
                        <input 
                            type="file" 
                            id="importFile" 
                            accept=".json" 
                            style="display: none;"
                        >
                    </div>
                    <p class="text-xs text-gray-500 text-center mt-2">
                        Backup data Anda ke file JSON untuk keamanan
                    </p>
                </div>
            </section>

            <!-- Todo List -->
            <section class="mb-6">
                <div id="todoList" class="space-y-3">
                    <!-- Todo items will be dynamically added here -->
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="text-center py-12">
                    <i class="fas fa-clipboard-list text-6xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500 text-lg">Belum ada tugas</p>
                    <p class="text-gray-400 text-sm mt-2">Tambahkan tugas baru untuk memulai</p>
                </div>
            </section>

            <!-- Clear Completed Button -->
            <section class="text-center">
                <button 
                    id="clearCompletedBtn" 
                    class="px-6 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors duration-200 font-medium hidden"
                >
                    <i class="fas fa-trash mr-2"></i>
                    Hapus yang Selesai
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="text-center mt-8 text-gray-600">
            <p class="text-sm">
                <i class="fas fa-heart text-red-500"></i>
                Dibuat dengan profesionalisme untuk meningkatkan produktivitas
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
